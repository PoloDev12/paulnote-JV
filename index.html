  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root { --bg: #e8f5e9; --card: #ffffff; --text: #000000; --green: #1b5e20; --soft: #f1f8f4; }
    body.dark { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --green: #2e7d32; --soft: #2a2a2a; }
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(180deg, var(--bg), var(--card)); padding: 20px; color: var(--text); transition: 0.3s; }
    .topbar { display: flex; align-items: center; gap: 15px; background: var(--green); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; }
    .menu-btn { font-size: 22px; cursor: pointer; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
    .slogan { font-size: 13px; opacity: 0.9; margin-left: auto; }
    .side-menu { position: fixed; top: 20px; left: -260px; width: 240px; background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: left 0.3s ease; z-index: 1000; }
    .side-menu.open { left: 20px; }
    .side-menu button { width: 100%; margin-bottom: 10px; padding: 8px; border: none; border-radius: 8px; background: var(--soft); cursor: pointer; font-weight: 600; color: var(--text); }
    .container { max-width: 520px; margin: auto; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.25); border-top: 8px solid var(--green); }
    .hidden { display: none; }
    .matiere { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px 10px; border-radius: 8px; background: var(--soft); }
    input[type=number] { width: 80px; background: transparent; color: var(--text); }
    button.main { width: 100%; margin-top: 15px; padding: 10px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .checkbox { display: flex; align-items: center; margin-bottom: 8px; }
    .checkbox input { margin-right: 8px; }
    .history-item { padding: 10px; margin-bottom: 10px; background: var(--soft); border-radius: 8px; display: flex; justify-content: space-between; }
    #paul-bubble { position: fixed; bottom: 24px; right: 24px; z-index: 2000; height: 44px; padding: 0 18px; border-radius: 22px; background: var(--green); color: white; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.35); transition: transform 0.2s; user-select: none; }
    #paul-bubble:hover { transform: scale(1.05); }
    #paul-chat { position: fixed; bottom: 82px; right: 24px; z-index: 2000; width: 340px; background: var(--card); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; transition: opacity 0.25s, transform 0.25s; max-height: 520px; }
    #paul-chat.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }
    .paul-header { background: var(--green); color: white; padding: 13px 16px; display: flex; align-items: center; gap: 10px; }
    .paul-header .paul-name { font-weight: 700; font-size: 16px; }
    .paul-header .paul-status { font-size: 11px; opacity: 0.85; }
    .paul-header .paul-close { margin-left: auto; cursor: pointer; font-size: 18px; opacity: 0.8; }
    #paul-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 220px; max-height: 340px; }
    .msg { max-width: 84%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .msg.ai { background: var(--soft); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: var(--green); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .paul-suggestions { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; }
    .paul-suggestions button { font-size: 11px; padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; transition: 0.2s; }
    .paul-suggestions button:hover { background: var(--green); color: white; }
    .paul-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--soft); }
    .paul-input-row input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1.5px solid var(--soft); background: var(--soft); color: var(--text); font-size: 13px; outline: none; }
    .paul-input-row input:focus { border-color: var(--green); }
    .paul-input-row button { width: 36px; height: 36px; border-radius: 50%; background: var(--green); color: white; border: none; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo">PAULNOTE</div>
  <div class="slogan">Ta moyenne générale, simplement.</div>
</header>

<div class="side-menu" id="sideMenu">
  <h3>Menu</h3>
  <button onclick="showHome()">🏠 Maison</button>
  <button onclick="showSettings()">⚙️ Matières</button>
  <button onclick="showHistory()">📈 Progression</button>
  <button onclick="toggleDarkMode()">🌙 Mode sombre</button>
  <button onclick="openPaul()">✨ Paul AI</button>
</div>

<div class="container" id="home"></div>
<div class="container hidden" id="settings">
  <h2>Choisis tes matières</h2>
  <div id="matieres-checkbox"></div>
  <button class="main" onclick="appliquerMatieres()">Appliquer</button>
</div>
<div class="container hidden" id="history">
  <h2>Progression des moyennes</h2>
  <div id="history-list"></div>
</div>

<div id="paul-bubble" onclick="togglePaul()">Paul AI</div>

<div id="paul-chat" class="hidden">
  <div class="paul-header">
    <div>
      <div class="paul-name">Paul AI</div>
      <div class="paul-status">Toujours là pour t'aider</div>
    </div>
    <div class="paul-close" onclick="togglePaul()">✕</div>
  </div>
  <div id="paul-messages"></div>
  <div class="paul-suggestions" id="paul-suggestions">
    <button onclick="sendSuggestion('aide moi en maths')">➗ Maths</button>
    <button onclick="sendSuggestion('aide moi en francais')">✍️ Français</button>
    <button onclick="sendSuggestion('aide moi en histoire')">📜 Histoire</button>
    <button onclick="sendSuggestion('aide moi en svt')">🔬 SVT</button>
    <button onclick="sendSuggestion('aide moi en physique chimie')">⚗️ Physique</button>
    <button onclick="sendSuggestion('motive moi')">💪 Motivation</button>
    <button onclick="sendSuggestion('on discute')">💬 Discuter</button>
    <button onclick="sendSuggestion('raconte moi une blague')">😄 Blague</button>
  </div>
  <div class="paul-input-row">
    <input type="text" id="paul-input" placeholder="Écris à Paul AI…" onkeydown="if(event.key==='Enter') sendMessage()" />

      "Grammaire — les règles les plus importantes :\n\n✅ ACCORD DU PARTICIPE PASSÉ :\n• Avec être : s'accorde en genre et nombre avec le SUJET.\nEx : Elles sont parties. / Il est arrivé.\n• Avec avoir : s'accorde avec le COD seulement si le COD est AVANT le verbe.\nEx : La chanson qu'il a chantée. (COD 'que' = 'chanson' = féminin, avant le verbe)\nEx : Il a chanté une chanson. (COD après = pas d'accord)\n\n✅ ACCORD SUJET-VERBE :\n• Toujours identifier le sujet avant d'accorder.\n• Attention aux sujets inversés : 'Arrivent les vacances.' → sujet = vacances.\n• Collectif + complément : 'Une foule de gens est venue.' (accord avec le noyau)\n\n✅ SUBJONCTIF — quand l'utiliser :\n• Après 'que' + verbe de volonté, de sentiment, de doute.\nEx : Je veux que tu viennes. / Il faut que tu fasses tes devoirs.\n• Conjonctions : bien que, pour que, avant que, à moins que...\n\n✅ TOUT/TOUS/TOUTE/TOUTES :\n• Adjectif (avant un nom) : tout s'accorde → toute la classe, tous les élèves.\n• Adverbe (avant un adjectif) : invariable en principe → il est tout rouge.\nException : devant féminin commençant par consonne → elle est toute rouge.\n\nQuelle règle te bloque ?"

  function paulRespond(msg) {
    const m = msg.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    for (const entry of paulDB) {
      if (entry.keys.some(k => m.includes(k.normalize("NFD").replace(/[\u0300-\u036f]/g, "")))) {
        const reps = entry.rep;
        return reps[Math.floor(Math.random() * reps.length)];
      }
    }
    return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
  }

  // Paul AI UI
  let paulOpen = false;
  let paulGreeted = false;

  function togglePaul(){
    paulOpen = !paulOpen;
    document.getElementById('paul-chat').classList.toggle('hidden', !paulOpen);
    if(paulOpen && !paulGreeted){
      paulGreeted = true;
      addMsg('ai', "Salut ! Je suis Paul AI. Je peux t'aider avec tes devoirs dans toutes les matières, t'expliquer des notions de cours, te motiver, ou juste discuter de tout et de rien. Qu'est-ce qu'on fait ?");
    }
    if(paulOpen) setTimeout(() => document.getElementById('paul-input').focus(), 100);
  }
  function openPaul(){
    if(!paulOpen) togglePaul();
    toggleMenu();
  }

  function addMsg(role, text){
    const div = document.getElementById('paul-messages');
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    div.appendChild(el);
    div.scrollTop = div.scrollHeight;
    return el;
  }

  function sendSuggestion(text){
    document.getElementById('paul-suggestions').style.display = 'none';
    document.getElementById('paul-input').value = text;
    sendMessage();
  }

  function sendMessage(){
    const input = document.getElementById('paul-input');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    document.getElementById('paul-suggestions').style.display = 'none';
    addMsg('user', text);
    setTimeout(() => {
      addMsg('ai', paulRespond(text));
    }, 300 + Math.random() * 500);
  }

  renderHome(); renderSettings();
