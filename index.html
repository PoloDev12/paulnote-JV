  <meta name="mobile-web-app-capable" content="yes" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root { --bg: #e8f5e9; --card: #ffffff; --text: #000000; --green: #1b5e20; --soft: #f1f8f4; }
    body.dark { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --green: #2e7d32; --soft: #2a2a2a; }

    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(180deg, var(--bg), var(--card)); padding: 20px; color: var(--text); transition: 0.3s; }

    .topbar { display: flex; align-items: center; gap: 15px; background: var(--green); color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; }
    .menu-btn { font-size: 22px; cursor: pointer; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
    .slogan { font-size: 13px; opacity: 0.9; margin-left: auto; }

    .side-menu { position: fixed; top: 20px; left: -260px; width: 240px; background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: left 0.3s ease; z-index: 1000; }
    .side-menu.open { left: 20px; }
    .side-menu button { width: 100%; margin-bottom: 10px; padding: 8px; border: none; border-radius: 8px; background: var(--soft); cursor: pointer; font-weight: 600; color: var(--text); }

    .container { max-width: 520px; margin: auto; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.25); border-top: 8px solid var(--green); }
    .hidden { display: none; }

    .matiere { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px 10px; border-radius: 8px; background: var(--soft); }
    input[type=number] { width: 80px; background: transparent; color: var(--text); }
    button.main { width: 100%; margin-top: 15px; padding: 10px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .checkbox { display: flex; align-items: center; margin-bottom: 8px; }
    .checkbox input { margin-right: 8px; }
    .history-item { padding: 10px; margin-bottom: 10px; background: var(--soft); border-radius: 8px; display: flex; justify-content: space-between; }

    /* ── Paul AI bulle flottante ── */
    #paul-bubble {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;
      height: 44px; padding: 0 18px;
      border-radius: 22px;
      background: var(--green); color: white;
      font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    #paul-bubble:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

    #paul-chat {
      position: fixed; bottom: 82px; right: 24px; z-index: 2000;
      width: 340px; background: var(--card);
      border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; overflow: hidden;
      transition: opacity 0.25s, transform 0.25s;
      max-height: 500px;
    }
    #paul-chat.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }

    .paul-header {
      background: var(--green); color: white;
      padding: 13px 16px; display: flex; align-items: center; gap: 10px;
    }
    .paul-header .paul-name { font-weight: 700; font-size: 16px; }
    .paul-header .paul-status { font-size: 11px; opacity: 0.85; }
    .paul-header .paul-close { margin-left: auto; cursor: pointer; font-size: 18px; opacity: 0.8; line-height: 1; }

    #paul-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      min-height: 220px; max-height: 320px;
    }
    .msg { max-width: 84%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .msg.ai { background: var(--soft); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: var(--green); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.loading { opacity: 0.55; font-style: italic; }

    .paul-suggestions {
      display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px;
    }
    .paul-suggestions button {
      font-size: 11px; padding: 5px 10px; border-radius: 20px;
      border: 1.5px solid var(--green); background: transparent;
      color: var(--green); cursor: pointer; transition: 0.2s;
    }
    .paul-suggestions button:hover { background: var(--green); color: white; }

    .paul-input-row {
      display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid var(--soft);
    }
    .paul-input-row input {
      flex: 1; padding: 8px 12px; border-radius: 20px;
      border: 1.5px solid var(--soft); background: var(--soft);
      color: var(--text); font-size: 13px; outline: none;
    }
    .paul-input-row input:focus { border-color: var(--green); }
    .paul-input-row button {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--green); color: white;
      border: none; font-size: 16px; cursor: pointer;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo">PAULNOTE</div>
  <div class="slogan">Ta moyenne générale, simplement.</div>
</header>

<div class="side-menu" id="sideMenu">
  <h3>Menu</h3>
  <button onclick="showHome()">🏠 Maison</button>
  <button onclick="showSettings()">⚙️ Matières</button>
  <button onclick="showHistory()">📈 Progression</button>
  <button onclick="toggleDarkMode()">🌙 Mode sombre</button>
  <button onclick="openPaul()">✨ Paul AI</button>
</div>

<div class="container" id="home"></div>
<div class="container hidden" id="settings">
  <h2>Choisis tes matières</h2>
  <div id="matieres-checkbox"></div>
  <button class="main" onclick="appliquerMatieres()">Appliquer</button>
</div>
<div class="container hidden" id="history">
  <h2>Progression des moyennes</h2>
  <div id="history-list"></div>
</div>

<!-- Paul AI bulle -->
<div id="paul-bubble" onclick="togglePaul()">Paul AI</div>

<!-- Paul AI chat -->
<div id="paul-chat" class="hidden">
  <div class="paul-header">
    <div>
      <div class="paul-name">Paul AI</div>
      <div class="paul-status">Toujours là pour t'aider</div>
    </div>
    <div class="paul-close" onclick="togglePaul()">✕</div>
  </div>
  <div id="paul-messages"></div>
  <div class="paul-suggestions" id="paul-suggestions">
    <button onclick="sendSuggestion('Fais mes devoirs de maths')">📐 Devoirs de maths</button>
    <button onclick="sendSuggestion('Aide-moi à rédiger une dissertation')">✍️ Dissertation</button>
    <button onclick="sendSuggestion('Motive-moi !')">💪 Motive-moi</button>
    <button onclick="sendSuggestion('On discute ?')">💬 Discuter</button>
  </div>
  <div class="paul-input-row">
    <input type="text" id="paul-input" placeholder="Écris à Paul AI…" onkeydown="if(event.key==='Enter') sendMessage()" />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const sideMenu = document.getElementById('sideMenu');
  const home = document.getElementById('home');
  const settings = document.getElementById('settings');
  const historyPage = document.getElementById('history');

  const toutesMatieres = ['Maths','Français','Histoire-Géo','Anglais écrit','Anglais oral','Espagnol écrit','Espagnol oral','Allemand écrit','Allemand oral','SVT','Physique-Chimie','Technologie','EPS','Arts plastiques','Musique','Latin'];
  let matieresActives = JSON.parse(localStorage.getItem('matieres')) || toutesMatieres;
  let historique = JSON.parse(localStorage.getItem('historique')) || [];
  if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

  function toggleMenu(){ sideMenu.classList.toggle('open'); }
  function hideAll(){ home.classList.add('hidden'); settings.classList.add('hidden'); historyPage.classList.add('hidden'); }
  function showHome(){ hideAll(); home.classList.remove('hidden'); toggleMenu(); }
  function showSettings(){ hideAll(); settings.classList.remove('hidden'); toggleMenu(); renderSettings(); }
  function showHistory(){ hideAll(); historyPage.classList.remove('hidden'); renderHistory(); toggleMenu(); }
  function toggleDarkMode(){ document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }

  function renderHome(){
    home.innerHTML = '';
    matieresActives.forEach(m => home.innerHTML += `<div class="matiere"><span>${m}</span><input type="number" step="0.01" min="0" max="20"></div>`);
    home.innerHTML += `<button class="main" onclick="calculerMoyenne()">Valider</button><div id="resultat"></div>`;
  }
  function renderSettings(){
    const box = document.getElementById('matieres-checkbox'); box.innerHTML='';
    toutesMatieres.forEach(m => box.innerHTML += `<div class="checkbox"><input type="checkbox" ${matieresActives.includes(m)?'checked':''} value="${m}"> ${m}</div>`);
  }
  function appliquerMatieres(){
    const checks = document.querySelectorAll('#matieres-checkbox input');
    matieresActives = [...checks].filter(c=>c.checked).map(c=>c.value);
    localStorage.setItem('matieres', JSON.stringify(matieresActives));
    renderHome(); showHome();
  }
  function calculerMoyenne(){
    const inputs = document.querySelectorAll('#home input');
    let total=0,count=0;
    inputs.forEach(i=>{const v=parseFloat(i.value); if(!isNaN(v)){total+=v;count++;}});
    if(!count){ document.getElementById('resultat').textContent='Entre au moins une note 😅'; return; }
    const moyenne=(total/count).toFixed(2);
    document.getElementById('resultat').textContent=`Moyenne générale : ${moyenne} / 20`;
    historique.push({date:new Date().toLocaleDateString(),moyenne});
    localStorage.setItem('historique', JSON.stringify(historique));
  }
  function renderHistory(){
    const list=document.getElementById('history-list');
    list.innerHTML = historique.length ? '' : '<p>Aucune moyenne enregistrée.</p>';
    historique.forEach(h=> list.innerHTML += `<div class="history-item"><span>${h.date}</span><strong>${h.moyenne} / 20</strong></div>`);
  }

  // ── Paul AI ──
  let paulOpen = false;
  let paulHistory = [];
  let paulGreeted = false;

  function togglePaul(){
    paulOpen = !paulOpen;
    document.getElementById('paul-chat').classList.toggle('hidden', !paulOpen);
    if(paulOpen && !paulGreeted){
      paulGreeted = true;
      addMsg('ai', "Salut ! Je suis Paul AI. Je peux t'aider à faire tes devoirs, répondre à toutes tes questions scolaires, ou simplement discuter. Qu'est-ce que je peux faire pour toi ?");
    }
    if(paulOpen) setTimeout(() => document.getElementById('paul-input').focus(), 100);
  }
  function openPaul(){
    if(!paulOpen) togglePaul();
    toggleMenu();
  }

  function addMsg(role, text){
    const div = document.getElementById('paul-messages');
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    div.appendChild(el);
    div.scrollTop = div.scrollHeight;
    return el;
  }

  function sendSuggestion(text){
    document.getElementById('paul-suggestions').style.display = 'none';
    document.getElementById('paul-input').value = text;
    sendMessage();
  }

  async function sendMessage(){
    const input = document.getElementById('paul-input');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';

    document.getElementById('paul-suggestions').style.display = 'none';
    addMsg('user', text);

    // Contexte notes
    const noteInputs = document.querySelectorAll('#home input');
    let notes = [];
    noteInputs.forEach((inp, i) => {
      const v = parseFloat(inp.value);
      if(!isNaN(v)) notes.push(`${matieresActives[i]}: ${v}/20`);
    });
    const notesContext = notes.length ? `Notes actuelles de l'élève : ${notes.join(', ')}. ` : '';

    const loadEl = addMsg('ai', '…');
    loadEl.classList.add('loading');

    paulHistory.push({ role: 'user', content: text });

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `Tu es Paul AI, un assistant intégré dans l'application Paulnote. Tu es intelligent, polyvalent et sympa. Tu peux :
- Faire les devoirs de l'élève (exercices de maths, rédactions, dissertations, résumés, traductions, etc.)
- Répondre à n'importe quelle question scolaire ou générale
- Discuter de tout et de rien, comme un ami
- Conseiller et motiver l'élève sur sa scolarité
${notesContext}
Réponds toujours en français. Sois naturel, direct et utile. Pour les devoirs, donne des réponses complètes et détaillées. Ne mentionne jamais que tu es Claude ou fait par Anthropic — tu es Paul AI, créé par Paulnote.`,
          messages: paulHistory
        })
      });
      const data = await res.json();
      const reply = data.content[0].text;
      paulHistory.push({ role: 'assistant', content: reply });
      loadEl.classList.remove('loading');
      loadEl.innerHTML = reply
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
      document.getElementById('paul-messages').scrollTop = document.getElementById('paul-messages').scrollHeight;
    } catch(e) {
      loadEl.classList.remove('loading');
      loadEl.textContent = "Oups, une erreur est survenue. Réessaie !";
    }
  }

  renderHome(); renderSettings();
</script>
</body>
</html>
